repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run pyright
        args: [packages/markitai/src]
        language: system
        types: [python]
        pass_filenames: false
        # Full-project type check takes tens of seconds — run before push
        # (and in CI) instead of on every commit
        stages: [pre-push]

      - id: pytest
        name: pytest
        entry: uv run pytest -x -q -n auto
        language: system
        pass_filenames: false
        stages: [pre-push]
