[project]
name = "mkai"
version = "0.15.0"
description = "Alias package for markitai — installing either provides both the `markitai` and `mkai` commands"
license = "MIT"
requires-python = ">=3.11,<3.15"
authors = [
    { name = "Ynewtime", email = "longqiliuye@gmail.com" }
]
readme = "README.md"
dependencies = [
    "markitai>=0.15.0",
]

[project.optional-dependencies]
# Forward extras to markitai — single source of truth there
claude-agent = ["markitai[claude-agent]>=0.15.0"]
copilot = ["markitai[copilot]>=0.15.0"]
gemini-cli = ["markitai[gemini-cli]>=0.15.0"]
browser = ["markitai[browser]>=0.15.0"]
extra-fetch = ["markitai[extra-fetch]>=0.15.0"]
kreuzberg = ["markitai[kreuzberg]>=0.15.0"]
svg = ["markitai[svg]>=0.15.0"]
heif = ["markitai[heif]>=0.15.0"]
all = ["markitai[all]>=0.15.0"]

[project.urls]
Homepage = "https://markitai.ynewtime.com"
Repository = "https://github.com/Ynewtime/markitai"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mkai"]
