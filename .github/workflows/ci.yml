name: Python CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/markitai/**'
      - 'README.md'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/markitai/**'
      - 'README.md'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@v7.6.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Run ruff check
        run: uv run ruff check packages/markitai/src packages/markitai/tests

      - name: Run ruff format check
        run: uv run ruff format --check packages/markitai/src packages/markitai/tests

      - name: Run pyright
        run: uv run pyright packages/markitai/src packages/markitai/tests

      - name: Run import-layer contracts
        run: uv run lint-imports

      - name: Run bandit security scan
        run: uv run bandit -r packages/markitai/src -c pyproject.toml

      - name: Verify package build
        run: uv build --package markitai --out-dir dist --clear

  # Quality gate for the webextract HTML->Markdown pipeline: scores the
  # local defuddle corpus (pure extraction, no network/LLM, ~10s) and fails
  # when any fixture or the corpus mean drops below its guardrail floor
  # (benchmarks/guardrails.json, floors = score * 0.9 at generation time).
  # Regenerate floors deliberately with --update-guardrails.
  # Always runs: the workflow-level paths filter already scopes this to
  # packages/markitai/** changes and the whole job finishes in ~1 minute.
  webextract-guardrails:
    name: Webextract quality guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@v7.6.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Run benchmark with guardrails check
        run: uv run python packages/markitai/benchmarks/webextract_quality.py --check --no-color

  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@v7.6.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen --all-groups --all-extras

      - name: Install LibreOffice (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice --no-install-recommends

      - name: Install LibreOffice (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install --cask libreoffice

      - name: Install LibreOffice (Windows)
        if: runner.os == 'Windows'
        run: |
          $maxRetries = 3
          for ($i = 1; $i -le $maxRetries; $i++) {
            choco install libreoffice-fresh -y --no-progress
            if ($LASTEXITCODE -eq 0) { break }
            Write-Host "Attempt $i failed, retrying in $($i * 5) seconds..."
            Start-Sleep -Seconds ($i * 5)
          }
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Run unit tests with coverage
        run: uv run pytest packages/markitai/tests/unit --cov=markitai --cov-report=xml --cov-report=term-missing

      - name: Run integration tests with coverage
        run: uv run pytest packages/markitai/tests/integration --cov=markitai --cov-append

      # Tool environments are isolated from the workspace, so this resolves the
      # wheel's published dependencies without consulting uv.lock.
      - name: Smoke-test fresh wheel install
        shell: bash
        run: |
          uv build --package markitai --wheel --out-dir wheel-smoke --clear
          wheel="$(find wheel-smoke -name 'markitai-*.whl' -print -quit)"
          test -n "$wheel"
          uv tool run --isolated --python '${{ matrix.python-version }}' --from "$wheel" markitai --version
          uv tool run --isolated --python '${{ matrix.python-version }}' --from "$wheel" markitai --help >/dev/null

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: |
            coverage.xml
            .coverage
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 7

  coverage-comment:
    name: Coverage comment
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    permissions:
      # Post/update the coverage comment on PRs.
      pull-requests: write
      # Update the python-coverage-comment-action-data branch (badge + stored
      # coverage that the PR comment compares against) on pushes to main.
      contents: write
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Download coverage data
        uses: actions/download-artifact@v8.0.1
        with:
          name: coverage-report

      - name: Coverage comment
        id: coverage_comment
        uses: py-cov-action/python-coverage-comment-action@v3.41
        with:
          GITHUB_TOKEN: ${{ github.token }}

      # Fork PRs run with a read-only token, so the action writes the comment
      # to a file instead; coverage-comment.yml (workflow_run) posts it.
      - name: Store PR comment to be posted
        if: steps.coverage_comment.outputs.COMMENT_FILE_WRITTEN == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: python-coverage-comment-action
          path: python-coverage-comment-action.txt
