name: Release

# Manual release flow (no release-please). To cut a release:
#   1. bump __version__ in packages/markitai/src/markitai/__init__.py
#   2. add a `## [X.Y.Z]` section to CHANGELOG.md
#   3. if the webapp changed, run scripts/sync_webapp_static.sh so the packaged
#      serve/static matches webapp/src (the `webapp` job below re-checks this
#      and fails the release if it is stale)
#   4. commit + push to main
#   5. git tag vX.Y.Z && git push origin vX.Y.Z
# Pushing the tag runs this workflow: tests -> build -> tag/version check ->
# publish to PyPI -> create the GitHub Release (notes from the CHANGELOG section).
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing vX.Y.Z tag to (re)publish'
        required: true

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  # The wheel packages the committed serve/static as-is (no rebuild at publish
  # time), so a release must verify that snapshot matches webapp/src — else a
  # frontend change committed without scripts/sync_webapp_static.sh ships stale
  # assets. This mirrors ci.yml's webapp job and gates `publish` below.
  webapp:
    name: Webapp test & packaged-asset check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: webapp/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm --dir webapp install --frozen-lockfile

      - name: Run tests
        run: pnpm --dir webapp test

      - name: Build webapp and verify packaged assets are in sync
        run: scripts/sync_webapp_static.sh --check

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7.6.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen --all-groups --all-extras

      - name: Run lint
        run: uv run ruff check packages/markitai/src

  # Releases gate on the same OS/Python matrix as ci.yml: a platform-only
  # test failure (e.g. Windows) must block PyPI publishing, not just CI.
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7.6.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen --all-groups --all-extras

      - name: Install LibreOffice (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice --no-install-recommends

      - name: Install LibreOffice (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install --cask libreoffice

      - name: Install LibreOffice (Windows)
        if: runner.os == 'Windows'
        run: |
          $maxRetries = 3
          for ($i = 1; $i -le $maxRetries; $i++) {
            choco install libreoffice-fresh -y --no-progress
            if ($LASTEXITCODE -eq 0) { break }
            Write-Host "Attempt $i failed, retrying in $($i * 5) seconds..."
            Start-Sleep -Seconds ($i * 5)
          }
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Run unit tests
        run: uv run pytest packages/markitai/tests/unit

      - name: Run integration tests
        run: uv run pytest packages/markitai/tests/integration

      # Tool environments are isolated from the workspace, so this resolves the
      # wheel's published dependencies without consulting uv.lock.
      - name: Smoke-test fresh wheel install
        shell: bash
        run: |
          uv build --package markitai --wheel --out-dir wheel-smoke --clear
          wheel="$(find wheel-smoke -name 'markitai-*.whl' -print -quit)"
          test -n "$wheel"
          python - "$wheel" <<'PY'
          import sys
          import zipfile

          with zipfile.ZipFile(sys.argv[1]) as wheel_file:
              names = set(wheel_file.namelist())
          required = {
              "markitai/serve/static/index.html",
              "markitai/serve/static/favicon.ico",
              "markitai/serve/static/logo.svg",
          }
          missing = required - names
          if missing or not any(
              name.startswith("markitai/serve/static/assets/") for name in names
          ):
              raise SystemExit(f"wheel is missing packaged webapp files: {sorted(missing)}")
          PY
          uv tool run --isolated --python '${{ matrix.python-version }}' --from "$wheel" markitai --version
          uv tool run --isolated --python '${{ matrix.python-version }}' --from "$wheel" markitai --help >/dev/null

  publish:
    needs: [webapp, lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create the GitHub Release
      id-token: write  # PyPI trusted publishing
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ env.TAG }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v7.6.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.13"

      - name: Build package
        run: uv build --package markitai --out-dir dist --clear

      - name: Verify tag matches built version
        run: |
          built_version=$(ls dist/markitai-*.tar.gz | sed -E 's|.*/markitai-(.+)\.tar\.gz|\1|')
          expected="v${built_version}"
          if [ "$TAG" != "$expected" ]; then
            echo "::error::Tag '$TAG' does not match built version '$built_version' (expected tag '$expected'). Bump packages/markitai/src/markitai/__init__.py before tagging."
            exit 1
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          packages-dir: dist/
          skip-existing: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${TAG#v}"
          notes_file="$(mktemp)"
          # Pull the matching "## [X.Y.Z]" section out of the changelog for notes.
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" {f=1; print; next}
            f && /^## \[/ {exit}
            f {print}
          ' CHANGELOG.md > "$notes_file"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping creation."
          elif [ -s "$notes_file" ]; then
            gh release create "$TAG" --title "$TAG" --notes-file "$notes_file"
          else
            echo "No CHANGELOG section for $version — generating notes."
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi
