name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@v7.6.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.13"

      - name: Install LibreOffice
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice --no-install-recommends

      - name: Install dependencies
        run: uv sync --frozen --all-groups --all-extras

      - name: Run lint
        run: uv run ruff check packages/markitai/src

      - name: Run unit tests
        run: uv run pytest packages/markitai/tests/unit

      - name: Run integration tests
        run: uv run pytest packages/markitai/tests/integration

  publish:
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for trusted publishing

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup uv
        uses: astral-sh/setup-uv@v7.6.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.13"

      - name: Build package
        run: uv build --package markitai --out-dir dist --clear

      - name: Verify build artifacts
        run: ls -la dist/

      - name: Verify tag matches built version
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        run: |
          built_version=$(ls dist/markitai-*.tar.gz | sed -E 's|.*/markitai-(.+)\.tar\.gz|\1|')
          tag="${{ github.event.release.tag_name || github.ref_name }}"
          expected="v${built_version}"
          if [ "$tag" != "$expected" ]; then
            echo "::error::Release tag '$tag' does not match built version '$built_version' (expected tag '$expected'). Did you forget to bump src/markitai/__init__.py?"
            exit 1
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          packages-dir: dist/
          skip-existing: true
